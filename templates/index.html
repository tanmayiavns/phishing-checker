<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
        }

        .safe { color: green; }
        .suspicious { color: orange; }
        .phishing { color: red; }

        ul {
            text-align: left;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h2>🔍 Phishing URL Detector</h2>

<form method="POST">
    <input type="text" name="url" placeholder="Enter URL here..." required>
    <br>
    <button type="submit">Analyze</button>
</form>

<div class="result">
    {% if result %}
        <p><strong>Result:</strong> {{ result }}</p>
        <p><strong>Score:</strong> {{ score }}</p>

        <h4>Reasons:</h4>
        <ul>
            {% for r in reasons %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>

</body>
</html>
